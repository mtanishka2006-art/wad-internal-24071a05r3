<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Catalog</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
	<div class="container">
		<a class="navbar-brand" href="#">Shopping Cart</a>
		<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="nav">
			<ul class="navbar-nav ms-auto">
				<li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
				<li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
				<li class="nav-item"><a class="nav-link active" href="catalog.html">Catalog</a></li>
				<li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
			</ul>
		</div>
	</div>
</nav>
<div class="container mt-4">
	<h4 class="text-center mb-4">Mobile Phone Catalog</h4>
	<div class="text-end mb-3">
		<button class="btn btn-outline-dark" id="logout">Logout</button>
	</div>
	<div class="row g-4">
		<div class="col-md-4">
			<div class="card h-100 text-center">
				<img src="https://m.media-amazon.com/images/I/717Q2swzhBL.jpg" class="img-fluid mx-auto mt-3" style="height:200px;object-fit:contain;">
				<div class="card-body d-flex flex-column">
					<h6>Samsung Galaxy S25 Ultra</h6>
					<p>₹1,30,000</p>
					<button class="btn btn-dark btn-sm mt-auto add-to-cart" data-name="Samsung Galaxy S25 Ultra" data-price="130000" data-img="https://m.media-amazon.com/images/I/717Q2swzhBL.jpg">Add to Cart</button>
				</div>
			</div>
		</div>
		<div class="col-md-4">
			<div class="card h-100 text-center">
				<img src="https://m.media-amazon.com/images/I/61giwQtR1qL._AC_UF1000,1000_QL80_.jpg" class="img-fluid mx-auto mt-3" style="height:200px;object-fit:contain;">
				<div class="card-body d-flex flex-column">
					<h6>iPhone 16 Pro Max</h6>
					<p>₹1,15,000</p>
					<button class="btn btn-dark btn-sm mt-auto add-to-cart" data-name="iPhone 16 Pro Max" data-price="115000" data-img="https://m.media-amazon.com/images/I/61giwQtR1qL._AC_UF1000,1000_QL80_.jpg">Add to Cart</button>
				</div>
			</div>
		</div>
		<div class="col-md-4">
			<div class="card h-100 text-center">
				<img src="https://image01-in.oneplus.net/media/202412/17/052a246708df8233d079b3502aeeb327.png" class="img-fluid mx-auto mt-3" style="height:200px;object-fit:contain;">
				<div class="card-body d-flex flex-column">
					<h6>OnePlus 13</h6>
					<p>₹70,000</p>
					<button class="btn btn-dark btn-sm mt-auto add-to-cart" data-name="OnePlus 13" data-price="70000" data-img="https://image01-in.oneplus.net/media/202412/17/052a246708df8233d079b3502aeeb327.png">Add to Cart</button>
				</div>
			</div>
		</div>
		<div class="col-md-4">
			<div class="card h-100 text-center">
				<img src="https://rukminim2.flixcart.com/image/480/640/xif0q/mobile/9/2/5/-original-imahem3ghfdvcvdn.jpeg?q=90" class="img-fluid mx-auto mt-3" style="height:200px;object-fit:contain;">
				<div class="card-body d-flex flex-column">
					<h6>Redmi Note 14 Pro</h6>
					<p>₹28,000</p>
					<button class="btn btn-dark btn-sm mt-auto add-to-cart" data-name="Redmi Note 14 Pro" data-price="28000" data-img="https://rukminim2.flixcart.com/image/480/640/xif0q/mobile/9/2/5/-original-imahem3ghfdvcvdn.jpeg?q=90">Add to Cart</button>
				</div>
			</div>
		</div>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!localStorage.getItem('currentUser')) {
	window.location.href = 'login.html';
}

document.querySelectorAll('.add-to-cart').forEach(button => {
	button.addEventListener('click', function() {
		const name = this.getAttribute('data-name');
		const price = parseInt(this.getAttribute('data-price'));
		const img = this.getAttribute('data-img');
		let cart = JSON.parse(localStorage.getItem('cart') || '[]');
		const existing = cart.find(item => item.name === name);
		if (existing) {
			existing.qty += 1;
		} else {
			cart.push({ name, price, img, qty: 1 });
		}
		localStorage.setItem('cart', JSON.stringify(cart));
document.getElementById('logout').addEventListener('click', function() {
	localStorage.removeItem('currentUser');
	window.location.href = 'login.html';
});
</script>
</body>
</html>
