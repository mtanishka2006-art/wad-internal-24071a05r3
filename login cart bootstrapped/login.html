<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
	<div class="container">
		<a class="navbar-brand" href="#">Shopping Cart</a>
		<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="nav">
			<ul class="navbar-nav ms-auto">
				<li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
				<li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
				<li class="nav-item"><a class="nav-link" href="catalog.html">Catalog</a></li>
				<li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
			</ul>
		</div>
	</div>
</nav>
<div class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-sm-8 col-md-6">
			<div class="card shadow">
				<div class="card-body">
					<h4 class="text-center mb-3">Login</h4>
					<form id="loginForm">
						<input class="form-control mb-3" placeholder="Username" id="username" required>
						<input type="password" class="form-control mb-3" placeholder="Password" id="password" required>
						<button type="submit" class="btn btn-dark w-100 mb-2">Submit</button>
						<button type="reset" class="btn btn-secondary w-100">Reset</button>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (localStorage.getItem('currentUser')) {
	window.location.href = 'catalog.html';
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
	e.preventDefault();
	const username = document.getElementById('username').value;
	const password = document.getElementById('password').value;
	const users = JSON.parse(localStorage.getItem('users') || '[]');
	const user = users.find(u => u.username === username && u.password === password);
	if (user) {
		localStorage.setItem('currentUser', username);
		window.location.href = 'catalog.html';
	} else {
		alert('Invalid credentials');
	}
});
</script>
</body>
</html>
